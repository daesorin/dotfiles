# --- KEYBINDINGS ---

# Applications
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod SHIFT, RETURN, exec, obsidian
bind = $mainMod, B, exec, librewolf
bind = $mainMod SHIFT, B, exec, brave
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, period, exec, rofi -show emoji
bind = $mainMod, Z, exec, $HOME/.local/bin/spend
bind = $mainMod, X, exec, $HOME/.local/bin/earn
bind = $mainMod, E, exec, kitty --class clipyazi -e yazi

# Waybar control
bind = $mainMod, W, exec, pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, W, exec, killall waybar || waybar

#bind = $mainMod, D, exec, rofi -show run -theme ~/.config/rofi/line.rasi

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, V, pin
bind = $mainMod, P, pseudo
bind = $mainMod, S, togglesplit

# Clipboard
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy

# --- AUDIO ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i audio-volume-high "Volume: $(pamixer --get-volume)%"
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i audio-volume-low "Volume: $(pamixer --get-volume)%"
bindl  = , XF86AudioMute, exec, pamixer -t && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i audio-volume-muted "Mute: $(pamixer --get-mute)"
bindl  = , XF86AudioMicMute, exec, pamixer --default-source -t && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i microphone-sensitivity-medium "Mic: $(pamixer --default-source --get-mute)"

# --- BRIGHTNESS ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i display-brightness-symbolic "Brightness: $(brightnessctl -m | cut -d, -f4)"
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i display-brightness-symbolic "Brightness: $(brightnessctl -m | cut -d, -f4)"

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Connectivity
bind = , XF86WLAN, exec, kitty -e nmtui
bind = , XF86Bluetooth, exec, blueman-manager

# Focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Media Keys (Laptop Fn keys)
bindl = , XF86AudioPlay, exec, mpc toggle
bindl = , XF86AudioNext, exec, mpc next
bindl = , XF86AudioPrev, exec, mpc prev

# Or Custom Keys (Super + m to toggle music)
bind = $mainMod, M, exec, mpc toggle

# Toggle Focus Mode with Super + F
bind = $mainMod, F, exec, ~/.local/bin/focus
