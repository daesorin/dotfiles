# --- ENVIRONMENT VARIABLES ---
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum

env = SAL_USE_VCLPLUGIN,gtk3

env = GTK_THEME,Adwaita:dark

# --- AUTOSTART ---
# Authentication / system agents
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Wallpaper daemon (Wayland-native)
exec-once = swww init
exec-once = swww-daemon --format xrgb
exec-once = swww img ~/Pictures/wallpapers/identity.png

# Idle & locking
exec-once = hypridle

# UI components
exec-once = waybar
exec-once = mako

# Clipboard management (text + images)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DBUS_SESSION_BUS_ADDRESS
